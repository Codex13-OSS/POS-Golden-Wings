<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Wings POS · Login</title>
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <div class="orb-layer" aria-hidden="true">
    <span class="orb orb-gold orb-1"></span>
    <span class="orb orb-gold orb-2"></span>
    <span class="orb orb-blue orb-3"></span>
    <span class="orb orb-purple orb-4"></span>
    <span class="orb orb-green orb-5"></span>
    <span class="orb orb-warm orb-6"></span>
  </div>
  <button type="button" class="theme-toggle login-theme-toggle" data-theme-toggle></button>
  <main class="login">
    <div class="brand-lockup" aria-label="Golden Wings">
      <div class="brand-badge">GW</div>
      <div class="brand-copy">
        <h1>Golden Wings</h1>
        <p>POS Executive Suite</p>
      </div>
    </div>
    <form id="loginForm" class="login-card">
      <label class="field">
        <span>Usuario</span>
        <input id="username" type="text" autocomplete="username" required />
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input id="password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit" class="primary">Entrar</button>
      <button type="button" id="kitchenButton" class="secondary">APP COCINA</button>
      <p id="loginError" class="error"></p>
    </form>
  </main>
  <script src="/theme.js"></script>
  <script src="/login.js"></script>
</body>
</html>
